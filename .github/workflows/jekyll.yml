# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Publish new posts every day
  schedule:
    - cron: "0 6 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Install OG image dependencies (only if missing)
        run: |
          packages=()

          if command -v vips >/dev/null 2>&1; then
            echo "libvips already available: $(vips --version)"
          else
            packages+=(libvips)
          fi

          if command -v fc-list >/dev/null 2>&1 && fc-list | grep -qi inter; then
            echo "Inter fonts already available"
          else
            packages+=(fonts-inter fonts-inter-variable)
          fi

          if [ ${#packages[@]} -gt 0 ]; then
            echo "Installing apt packages: ${packages[*]}"
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends "${packages[@]}"
          else
            echo "No apt packages needed"
          fi

          if command -v fc-list >/dev/null 2>&1 && fc-list | grep -qi lora; then
            echo "Lora fonts already available"
          else
            echo "Installing Lora fonts from Google Fonts repository..."
            wget -q -O /tmp/Lora-wght.ttf https://github.com/google/fonts/raw/main/ofl/lora/Lora%5Bwght%5D.ttf
            wget -q -O /tmp/Lora-Italic-wght.ttf https://github.com/google/fonts/raw/main/ofl/lora/Lora-Italic%5Bwght%5D.ttf
            sudo mkdir -p /usr/share/fonts/truetype/lora
            sudo cp /tmp/Lora-wght.ttf /tmp/Lora-Italic-wght.ttf /usr/share/fonts/truetype/lora/
          fi

          sudo fc-cache -fv
          echo "Font check:"
          fc-list | grep -Ei "inter|lora" || true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sendfox-sync:
    name: Sync SendFox Drafts
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 0
      - name: Install OG image dependencies (only if missing)
        run: |
          packages=()

          if command -v vips >/dev/null 2>&1; then
            echo "libvips already available: $(vips --version)"
          else
            packages+=(libvips)
          fi

          if command -v fc-list >/dev/null 2>&1 && fc-list | grep -qi inter; then
            echo "Inter fonts already available"
          else
            packages+=(fonts-inter fonts-inter-variable)
          fi

          if [ ${#packages[@]} -gt 0 ]; then
            echo "Installing apt packages: ${packages[*]}"
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends "${packages[@]}"
          else
            echo "No apt packages needed"
          fi

          if command -v fc-list >/dev/null 2>&1 && fc-list | grep -qi lora; then
            echo "Lora fonts already available"
          else
            echo "Installing Lora fonts from Google Fonts repository..."
            wget -q -O /tmp/Lora-wght.ttf https://github.com/google/fonts/raw/main/ofl/lora/Lora%5Bwght%5D.ttf
            wget -q -O /tmp/Lora-Italic-wght.ttf https://github.com/google/fonts/raw/main/ofl/lora/Lora-Italic%5Bwght%5D.ttf
            sudo mkdir -p /usr/share/fonts/truetype/lora
            sudo cp /tmp/Lora-wght.ttf /tmp/Lora-Italic-wght.ttf /usr/share/fonts/truetype/lora/
          fi

          sudo fc-cache -fv
      - name: Sync draft campaigns to SendFox
        run: bundle exec ruby scripts/sendfox_campaigns_cli.rb publish
        env:
          JEKYLL_ENV: production
          SENDFOX_FAIL_BUILD: "1"
          SENDFOX_API_TOKEN: ${{ secrets.SENDFOX_API_TOKEN }}
          SENDFOX_FROM_NAME: ${{ secrets.SENDFOX_FROM_NAME }}
          SENDFOX_FROM_EMAIL: ${{ secrets.SENDFOX_FROM_EMAIL }}
      - name: Backfill campaign IDs into posts
        run: |
          bundle exec ruby scripts/sendfox_backfill_ids.rb --apply --verbose

          if git diff --quiet -- _posts; then
            echo "No sendfox_campaign_id backfills to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts
          git commit -m "Backfill SendFox campaign IDs"
          git push
        env:
          SENDFOX_API_TOKEN: ${{ secrets.SENDFOX_API_TOKEN }}
